<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-900 via-blue-900 to-indigo-900">
    <div class="container mx-auto px-4 py-8 min-h-screen flex items-center justify-center">
        <div class="bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl p-8 w-full max-w-2xl border border-white/20">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-r from-purple-500 to-blue-500 rounded-full mb-4">
                    <i class="fas fa-shield-alt text-white text-2xl"></i>
                </div>
                <h1 class="text-4xl font-bold text-white mb-2">Secure Password Generator</h1>
                <p class="text-gray-300">Create strong, unique passwords instantly</p>
            </div>

            <!-- Password Display -->
            <div class="bg-black/30 rounded-2xl p-6 mb-6 border border-white/10">
                <div class="flex items-center justify-between mb-4">
                    <input 
                        type="text" 
                        id="passwordDisplay" 
                        readonly 
                        placeholder="Click generate to create password"
                        class="flex-1 bg-transparent text-white text-xl font-mono border-none outline-none placeholder-gray-400"
                    >
                    <button 
                        id="copyBtn" 
                        class="ml-4 p-3 bg-white/10 hover:bg-white/20 rounded-lg transition-all duration-200 text-white"
                        title="Copy to clipboard"
                    >
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                
                <!-- Strength Indicator -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <span class="text-sm text-gray-300">Password Strength</span>
                        <span id="strengthText" class="text-sm font-semibold text-gray-400">No Password</span>
                    </div>
                    <div class="h-2 bg-black/30 rounded-full overflow-hidden">
                        <div id="strengthBar" class="h-full bg-gradient-to-r from-red-500 to-red-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Password Length -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-3">
                    <label class="text-white font-medium">Password Length</label>
                    <span id="lengthValue" class="text-white font-bold text-lg">16</span>
                </div>
                <input 
                    type="range" 
                    id="lengthSlider" 
                    min="8" 
                    max="32" 
                    value="16"
                    class="w-full h-2 bg-black/30 rounded-lg appearance-none cursor-pointer slider"
                >
                <div class="flex justify-between text-xs text-gray-400 mt-1">
                    <span>8</span>
                    <span>32</span>
                </div>
            </div>

            <!-- Character Options -->
            <div class="space-y-4 mb-6">
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-lg border border-white/10">
                    <div class="flex items-center">
                        <i class="fas fa-font text-purple-400 mr-3"></i>
                        <span class="text-white">Uppercase (A-Z)</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="uppercase" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-500"></div>
                    </label>
                </div>

                <div class="flex items-center justify-between p-4 bg-white/5 rounded-lg border border-white/10">
                    <div class="flex items-center">
                        <i class="fas fa-text-height text-blue-400 mr-3"></i>
                        <span class="text-white">Lowercase (a-z)</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="lowercase" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
                    </label>
                </div>

                <div class="flex items-center justify-between p-4 bg-white/5 rounded-lg border border-white/10">
                    <div class="flex items-center">
                        <i class="fas fa-hashtag text-green-400 mr-3"></i>
                        <span class="text-white">Numbers (0-9)</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="numbers" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-500"></div>
                    </label>
                </div>

                <div class="flex items-center justify-between p-4 bg-white/5 rounded-lg border border-white/10">
                    <div class="flex items-center">
                        <i class="fas fa-asterisk text-yellow-400 mr-3"></i>
                        <span class="text-white">Symbols (!@#$...)</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="symbols" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-yellow-500"></div>
                    </label>
                </div>
            </div>

            <!-- Generate Button -->
            <button 
                id="generateBtn"
                class="w-full bg-gradient-to-r from-purple-500 to-blue-500 hover:from-purple-600 hover:to-blue-600 text-white font-bold py-4 px-6 rounded-xl transition-all duration-200 transform hover:scale-105 shadow-lg"
            >
                <i class="fas fa-magic mr-2"></i>
                Generate Password
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
